name: Deploy Cognito Stack (Manual)

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Deployment stage (e.g. dev, prod)'
        required: true
        default: 'prod'
      region:
        description: 'AWS region (e.g. us-east-1, ap-south-1)'
        required: true
        default: 'us-east-1'

permissions:
  id-token: write
  contents: read

jobs:
  deploy-cognito:
    name: Deploy Cognito User Pool
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'bookclub-app/backend/package-lock.json'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ github.event.inputs.region }}
          role-session-name: github-actions-deploy-cognito

      - name: Deploy Cognito Stack (Serverless)
        working-directory: bookclub-app/backend
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          OAUTH_REDIRECT_SIGNIN: ${{ vars.OAUTH_REDIRECT_SIGNIN }}
          OAUTH_REDIRECT_SIGNOUT: ${{ vars.OAUTH_REDIRECT_SIGNOUT }}
          USER_POOL_DOMAIN_PREFIX: ${{ vars.USER_POOL_DOMAIN_PREFIX }}
        run: |
          npm install
          npx serverless deploy --config serverless-cognito.yml --stage ${{ github.event.inputs.stage }} --region ${{ github.event.inputs.region }}
