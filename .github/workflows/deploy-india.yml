name: Deploy TownWink (India)

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to India (ap-south-1)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'bookclub-app/backend/package-lock.json'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN_INDIA || vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ap-south-1
          role-session-name: github-actions-deploy-india

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: 🏗️ Deploy Infrastructure (Terraform)
        working-directory: bookclub-app/backend/terraform
        env:
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=townwink-india-terraform-state" \
            -backend-config="region=ap-south-1" \
            -backend-config="key=terraform.tfstate"
          terraform apply -var-file="india.tfvars" -auto-approve

      - name: 📦 Deploy Backend (Serverless)
        working-directory: bookclub-app/backend
        env:
          DEPLOY_TARGET: india
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          COGNITO_USER_POOL_ID: ${{ vars.COGNITO_USER_POOL_ID || secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID || secrets.COGNITO_CLIENT_ID }}
          COGNITO_USER_POOL_ARN: ${{ vars.COGNITO_USER_POOL_ARN || secrets.COGNITO_USER_POOL_ARN }}
        run: |
          npm install
          npx serverless deploy --stage prod --region ap-south-1

      - name: 🎨 Build Frontend (React)
        working-directory: bookclub-app/frontend
        env:
          DEPLOY_TARGET: india
          CI: false
          COGNITO_USER_POOL_ID: ${{ vars.COGNITO_USER_POOL_ID || secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID || secrets.COGNITO_CLIENT_ID }}
          COGNITO_DOMAIN: ${{ vars.COGNITO_DOMAIN || secrets.COGNITO_DOMAIN }}
          COGNITO_REGION: ${{ vars.COGNITO_REGION || secrets.COGNITO_REGION }}
        run: |
          # Fetch dynamic values from serverless output, falling back to environment variables
          cd ../backend
          USER_POOL_ID=${COGNITO_USER_POOL_ID:-$(npx serverless info --stage prod --verbose | grep "UserPoolId:" | awk '{print $2}')}
          USER_POOL_CLIENT_ID=${COGNITO_CLIENT_ID:-$(npx serverless info --stage prod --verbose | grep "UserPoolClientId:" | awk '{print $2}')}
          cd ../frontend
          
          # Default to us-east-1 defaults or provided overrides
          COGNITO_REGION_VAL=${COGNITO_REGION:-"us-east-1"}
          COGNITO_DOMAIN_VAL=${COGNITO_DOMAIN:-"booklub-au-prod.auth.us-east-1.amazoncognito.com"}
          
          # Create .env.production
          cat > .env.production << EOF
          REACT_APP_BRAND_NAME=TownWink
          REACT_APP_API_URL=https://api.townwink.com
          REACT_APP_COGNITO_REGION=$COGNITO_REGION_VAL
          REACT_APP_COGNITO_USER_POOL_ID=$USER_POOL_ID
          REACT_APP_COGNITO_CLIENT_ID=$USER_POOL_CLIENT_ID
          REACT_APP_COGNITO_DOMAIN=$COGNITO_DOMAIN_VAL
          REACT_APP_OAUTH_REDIRECT_SIGNIN=https://townwink.com/auth/callback
          REACT_APP_OAUTH_REDIRECT_SIGNOUT=https://townwink.com/
          REACT_APP_DOMAIN=townwink.com
          EOF
          
          npm install
          npm run build

      - name: 📤 Upload to S3
        run: |
          aws s3 sync bookclub-app/frontend/build s3://townwink-india-frontend --delete

      - name: 🧹 Invalidate CloudFront Cache
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Aliases.Items!=null && contains(Aliases.Items, 'townwink.com')].Id | [0]" --output text)
          if [ -n "$DISTRIBUTION_ID" ] && [ "$DISTRIBUTION_ID" != "None" ]; then
            aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION_ID" --paths "/*"
          else
            echo "⚠️ Could not find CloudFront distribution for townwink.com"
          fi
